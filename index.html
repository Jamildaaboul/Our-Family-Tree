<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Daaboul Family Tree</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    :root { 
      --brass-light: #fceabb; 
      --brass-dark: #f8b500;
      --pipe: #d4af37;
      --wood-dark: #2d1a11; 
      --engraved: #3e2723;
      --male-ink: #1e88e5; 
      --female-ink: #d81b60; 
    }
    
    html, body { 
      font-family: 'Segoe UI', serif; 
      background: var(--wood-dark) url('https://www.transparenttextures.com/patterns/dark-wood-50.png');
      margin: 0; padding: 0; overflow: hidden; 
      height: 100%; width: 100%; touch-action: none; 
    }
    
    .interface-layer { 
      position: fixed; top: 0; left: 0; right: 0; z-index: 999999; 
      background: rgba(45, 26, 17, 0.95); padding: 15px; 
      display: flex; flex-direction: column; align-items: center; gap: 10px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.8); pointer-events: auto;
      border-bottom: 2px solid var(--pipe);
    }
    .header-title { 
      color: var(--brass-light); margin: 0; 
      font-family: "Lucida Calligraphy", cursive, serif; font-size: 26px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .controls-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .search-input { 
      padding: 10px 15px; border-radius: 5px; border: 2px solid var(--engraved); 
      width: 180px; outline: none; font-size: 14px; color: var(--engraved);
      background: #fff; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }

    #viewport { width: 100vw; height: 100vh; cursor: grab; position: absolute; top: 0; left: 0; z-index: 100; overflow: hidden; }
    
    #tree-container { 
      position: absolute; left: 0; top: 0; transform-origin: 0 0; 
      width: max-content; min-width: 100vw; padding: 130px 40px 100px 40px; 
      display: flex; justify-content: center; 
    }

    /* BRASS PIPE CONNECTORS */
    .tree ul { display: flex; justify-content: center; flex-wrap: nowrap; padding: 40px 0 0 0; position: relative; list-style: none; margin: 0; }
    .tree li { position: relative; padding: 40px 15px 0; flex: 0 0 auto; text-align: center; }
    
    .tree li::before, .tree li::after { 
      content: ''; position: absolute; top: 0; right: 50%; 
      border-top: 5px solid var(--pipe); width: 50%; height: 40px; border-radius: 0;
      box-shadow: 0 3px 5px rgba(0,0,0,0.6);
    }
    .tree li::after { 
      right: auto; left: 50%; border-left: 5px solid var(--pipe); 
      margin-left: -2.5px; 
    }
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
    .tree li:last-child::before { border-right: 5px solid var(--pipe); margin-right: -2.5px; }
    
    .tree ul ul::before { 
      content: ''; position: absolute; top: 0; left: 50%; 
      border-left: 5px solid var(--pipe); width: 0; height: 40px; 
      margin-left: -2.5px; box-shadow: 3px 0 5px rgba(0,0,0,0.6);
    }

    /* BRASS PLAQUE DESIGN (Matching Reference Image) */
    .tree-node { 
      background: linear-gradient(135deg, var(--brass-light), var(--brass-dark));
      border: 3px solid #8c6200; 
      border-radius: 6px; 
      width: 320px; /* Wider to fit horizontal layout */
      padding: 12px; display: flex; align-items: center; gap: 15px;
      box-shadow: 6px 6px 15px rgba(0,0,0,0.8), inset 0 0 8px rgba(255,255,255,0.4); 
      position: relative;
    }
    
    /* Hardware Screws on the plaque */
    .screw { position: absolute; width: 8px; height: 8px; background: #555; border-radius: 50%; box-shadow: inset 1px 1px 2px #222, 1px 1px 1px rgba(255,255,255,0.5); }
    .screw::after { content: ''; position: absolute; top: 3px; left: 1px; width: 6px; height: 1.5px; background: #222; transform: rotate(45deg); }
    .s-tl { top: 6px; left: 6px; } .s-tr { top: 6px; right: 6px; }
    .s-bl { bottom: 6px; left: 6px; } .s-br { bottom: 6px; right: 6px; }

    /* HORIZONTAL CONTENT LAYOUT */
    .avatar-pair { display: flex; flex-direction: column; gap: 8px; margin: 0; }
    
    .node-avatar { 
      width: 60px; height: 60px; 
      border-radius: 6px; /* Square framed photos like the reference */
      border: 3px solid var(--engraved); 
      background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center;
      font-family: "Lucida Calligraphy", cursive, serif; font-size: 28px; font-weight: 900;
      cursor: pointer; position: relative; 
      color: #fff; text-shadow: 0 1px 2px #000;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }
    .node-avatar::after { content: '📸'; position: absolute; bottom: -8px; right: -8px; font-size: 12px; background: #fff; color: var(--engraved); border-radius: 50%; padding: 3px; border: 1px solid var(--engraved); box-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
    
    .male { background-color: var(--male-ink); } 
    .female { background-color: var(--female-ink); }
    
    .node-info { flex-grow: 1; display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
    
    .name-tag { font-family: "Lucida Calligraphy", cursive, serif; font-weight: bold; font-size: 16px; color: var(--engraved); margin: 0 0 5px 0; line-height: 1.2; text-shadow: 1px 1px 0px rgba(255,255,255,0.4); }
    .dob-tag { font-family: 'Segoe UI', serif; font-size: 13px; color: #5c4033; font-weight: bold; margin-bottom: 8px; }

    /* ACTION BUTTONS inside the plaque */
    .node-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 100%; }
    .btn { 
      padding: 6px; border: 1px solid rgba(0,0,0,0.3); border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; 
      background: var(--engraved); color: #fff; 
      box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }
    .btn:active { transform: scale(0.95); }
    
    .zoom-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--brass-light); background: var(--pipe); color: var(--engraved); font-size: 26px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; box-shadow: 0 3px 8px rgba(0,0,0,0.6); }
    .zoom-btn:active { transform: scale(0.9); background: var(--brass-dark); }
    
    .highlighted { box-shadow: 0 0 20px #fff, inset 0 0 15px #fff !important; }

    @media print {
      #top-nav { display: none !important; }
      body { background: white !important; }
      #tree-container { transform: none !important; position: relative !important; left: 0 !important; top: 0 !important; padding: 20px !important; }
    }
  </style>
</head>
<body>

  <div class="interface-layer" id="top-nav">
    <h2 class="header-title">The Daaboul Family Tree</h2>
    <div class="controls-row">
      <button type="button" class="zoom-btn" onpointerdown="triggerZoom(event, 0.8)">-</button>
      <button type="button" class="zoom-btn" onpointerdown="triggerZoom(event, 1.2)">+</button>
      
      <input type="text" class="search-input" id="searchBox" placeholder="Search Ancestors..." oninput="runSearch()">
      
      <button class="btn" style="background:#2e7d32; color:white; padding: 10px;" onclick="resetView()">🏠 Home</button>
      <button class="btn" style="background:var(--engraved); color:white; padding: 10px;" onclick="document.getElementById('fileIn').click()">📂 Load</button>
      <button class="btn" style="background:var(--male-ink); color:white; padding: 10px;" onclick="window.print()">🖨️ Save PDF</button>
      
      <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
      <input type="file" id="imagePicker" style="display:none" accept="image/*">
    </div>
  </div>

  <div id="viewport"><div id="tree-container" class="tree"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCT9sltvZJpDKz8x-y5pI7ABSu7GD3792c",
      authDomain: "daaboul-family-tree.firebaseapp.com",
      projectId: "daaboul-family-tree",
      storageBucket: "daaboul-family-tree.firebasestorage.app",
      messagingSenderId: "169162734833",
      appId: "1:169162734833:web:233a37139441336023bd50",
      databaseURL: "https://daaboul-family-tree-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('familyTree');
    let familyData = [];
    let activeTarget = null;
    let isFirstLoad = true;

    db.on('value', snap => {
      const data = snap.val();
      if(data) {
        familyData = Array.isArray(data) ? data : Object.values(data);
        render();
      }
    });

    function save() { db.set(familyData); }

    function runSearch() {
      const term = document.getElementById('searchBox').value.toLowerCase();
      document.querySelectorAll('.tree-node').forEach(node => {
        const name = node.querySelector('.name-tag').innerText.toLowerCase();
        node.classList.toggle('highlighted', term && name.includes(term));
      });
    }

    function render() {
      if (!familyData || familyData.length === 0) {
        document.getElementById('tree-container').innerHTML = "<h3 style='color:var(--brass-light); margin-top: 150px; font-family: \"Lucida Calligraphy\", cursive;'>Tree is empty. Click LOAD.</h3>";
        return;
      }

      const allIds = new Set(familyData.map(x => x.id));
      let roots = familyData.filter(x => !x.parentId || !allIds.has(x.parentId));
      if (roots.length === 0) roots = [familyData[0]];

      const build = (nodes) => {
        if(!nodes || nodes.length === 0) return "";
        let h = "<ul>";
        nodes.forEach(m => {
          const hasS = !!m.spouseName;
          const p1 = m.photo ? `style="background-image:url('${m.photo}')"` : '';
          const p2 = m.spousePhoto ? `style="background-image:url('${m.spousePhoto}')"` : '';
          
          const l1 = (m.name && m.name.length > 0) ? m.name[0].toUpperCase() : '?';
          const l2 = (hasS && m.spouseName && m.spouseName.length > 0) ? m.spouseName[0].toUpperCase() : '?';
          const children = familyData.filter(x => x.parentId == m.id);

          h += `<li>
            <div class="tree-node" id="node-${m.id}">
              <div class="screw s-tl"></div><div class="screw s-tr"></div>
              <div class="screw s-bl"></div><div class="screw s-br"></div>
              
              <div class="avatar-pair">
                <div class="node-avatar ${m.gender}" ${p1} onclick="pickNewFile(${m.id}, false)">${m.photo ? '' : l1}</div>
                ${hasS ? `<div class="node-avatar ${m.spouseGender || 'female'}" ${p2} onclick="pickNewFile(${m.id}, true)">${m.spousePhoto ? '' : l2}</div>` : ''}
              </div>
              
              <div class="node-info">
                <span class="name-tag">${m.name || 'Unknown'}${hasS ? '<br>& ' + m.spouseName : ''}</span>
                <span class="dob-tag">${m.dob || ''}</span>
                <div class="node-actions">
                  <button class="btn" style="background:#5d4037;" onclick="editP(${m.id})">Edit</button>
                  <button class="btn" style="background:#2e7d32;" onclick="addC(${m.id})">+Child</button>
                  <button class="btn" style="background:#8d6e63;" onclick="addS(${m.id})">+Spouse</button>
                  <button class="btn" style="background:#c62828;" onclick="delP(${m.id})">Del</button>
                </div>
              </div>
            </div>
            ${build(children)}
          </li>`;
        });
        return h + "</ul>";
      };

      document.getElementById('tree-container').innerHTML = build(roots);

      if(isFirstLoad) {
        setTimeout(centerOnRoot, 100); 
        setTimeout(centerOnRoot, 500);
        isFirstLoad = false;
      }
    }

    function centerOnRoot() {
      const ct = document.getElementById('tree-container');
      const rootNode = document.querySelector('.tree-node'); 
      
      if(rootNode && ct) {
        ct.style.transform = 'none'; 
        void ct.offsetWidth; 
        
        const rect = rootNode.getBoundingClientRect();
        const rootCenterX = rect.left + (rect.width / 2);
        const screenCenterX = window.innerWidth / 2;
        
        s = 1; 
        x = screenCenterX - rootCenterX; 
        y = 120; 
        apply();
      }
    }

    function pickNewFile(id, isSpouse) {
      activeTarget = { id, isSpouse };
      document.getElementById('imagePicker').click();
    }

    document.getElementById('imagePicker').onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const person = familyData.find(x => x.id == activeTarget.id);
        if(activeTarget.isSpouse) person.spousePhoto = event.target.result;
        else person.photo = event.target.result;
        save();
      };
      reader.readAsDataURL(file);
    };

    function editP(id) {
      const p = familyData.find(x => x.id == id);
      p.name = prompt("Name:", p.name);
      p.dob = prompt("Year:", p.dob || "");
      save();
    }
    function addC(pid) {
      const n = prompt("Child Name:");
      if(n) { familyData.push({id: Date.now(), name: n, gender: "male", parentId: pid, dob: ""}); save(); }
    }
    function addS(id) {
      const p = familyData.find(x => x.id == id);
      p.spouseName = prompt("Spouse Name:");
      p.spouseDOB = prompt("Spouse Year:");
      save();
    }
    function delP(id) {
      if(confirm("Delete person and descendants?")) { familyData = familyData.filter(x => x.id != id && x.parentId != id); save(); }
    }

    let s = 1, x = 0, y = 120, startX = 0, startY = 0, isDown = false;
    const ct = document.getElementById('tree-container');
    const vp = document.getElementById('viewport');
    
    function triggerZoom(event, amt) {
      event.preventDefault(); event.stopPropagation();
      s *= amt; apply();
    }
    
    function resetView() { centerOnRoot(); }
    function apply() { ct.style.transform = `translate(${x}px, ${y}px) scale(${s})`; }

    function isUI(e) { return e.target.closest('#top-nav') || e.target.closest('.btn') || e.target.closest('.node-avatar'); }

    vp.onmousedown = e => { if(isUI(e)) return; isDown = true; startX = e.clientX - x; startY = e.clientY - y; };
    vp.onmousemove = e => { if(!isDown) return; x = e.clientX - startX; y = e.clientY - startY; apply(); };
    vp.ontouchstart = e => { if(isUI(e)) return; isDown = true; startX = e.touches[0].clientX - x; startY = e.touches[0].clientY - y; };
    vp.ontouchmove = e => { if(!isDown) return; x = e.touches[0].clientX - startX; y = e.touches[0].clientY - startY; apply(); };
    window.onmouseup = window.ontouchend = () => isDown = false;

    function importData(e) {
      const r = new FileReader();
      r.onload = ev => { familyData = JSON.parse(ev.target.result); isFirstLoad = true; render(); save(); };
      r.readAsText(e.target.files[0]);
    }
  </script>
</body>
</html>
