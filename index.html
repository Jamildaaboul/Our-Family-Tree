<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Daaboul Family Tree</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --line: #94a3b8; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
    
    /* HEADER & TOOLBAR - Fixed Spacing */
    .header { position: fixed; top: 0; left: 0; right: 0; background: #1e293b; color: white; padding: 15px; text-align: center; z-index: 2000; height: 40px; }
    .header h1 { margin: 0; font-size: 22px; }
    
    /* Pushed the toolbar down to 85px so it doesn't hide */
    .toolbar { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: white; padding: 12px 25px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; gap: 10px; z-index: 1000; border: 2px solid #3b82f6; align-items: center; }
    
    .tool-btn { padding: 10px 15px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; text-transform: uppercase; transition: 0.2s; }
    .zoom-btn { background: #334155; color: white; width: 45px; font-size: 18px; }
    .export-btn { background: #3b82f6; color: white; }
    .load-btn { background: #64748b; color: white; }
    .share-btn { background: #f59e0b; color: white; }

    #viewport { width: 100%; height: 100%; cursor: grab; display: flex; align-items: center; justify-content: center; }
    #viewport:active { cursor: grabbing; }
    #tree-container { transform-origin: center center; transition: transform 0.1s ease-out; padding-top: 200px; }

    .tree ul { display: flex; justify-content: center; padding: 25px 0 0 0; position: relative; }
    .tree li { text-align: center; list-style-type: none; position: relative; padding: 25px 15px 0 15px; }
    .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 3px solid var(--line); width: 50%; height: 25px; }
    .tree li::after { right: auto; left: 50%; border-left: 3px solid var(--line); }
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 3px solid var(--line); width: 0; height: 25px; }

    .tree-node { background: var(--card); border: 2px solid #e2e8f0; border-radius: 18px; width: 250px; padding: 18px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    .avatar-pair { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; position: relative; }
    .marriage-line { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 35px; height: 3px; background: var(--line); }
    .node-avatar { width: 70px; height: 70px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; cursor: pointer; background-size: cover; background-position: center; position: relative; z-index: 2; }
    
    .male { background: #3b82f6; color: white; }
    .female { background: #ec4899; color: white; }
    .name-tag { font-weight: 800; color: var(--text); font-size: 17px; margin-top: 10px; }

    .node-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; }
    .btn { padding: 10px 5px; border: none; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    .edit-btn { background: #f1f5f9; color: #475569; }
    .add-btn { background: #10b981; color: white; }
    .spouse-btn { background: #8b5cf6; color: white; }
    .del-btn { background: #ef4444; color: white; }
  </style>
</head>
<body>
  <div class="header"><h1>The Daaboul Family Tree</h1></div>
  
  <div class="toolbar">
    <button class="tool-btn zoom-btn" onclick="zoom(1.2)">➕</button>
    <button class="tool-btn zoom-btn" onclick="zoom(0.8)">➖</button>
    <button class="tool-btn export-btn" onclick="exportData()">💾 Save</button>
    <button class="tool-btn load-btn" onclick="document.getElementById('fileInput').click()">📂 Load</button>
    <button class="tool-btn share-btn" onclick="copyLink()">🔗 Link</button>
    <input type="file" id="fileInput" style="display: none" onchange="importData(event)">
  </div>

  <div id="viewport">
    <div id="tree-container" class="tree"></div>
  </div>

  <script>
    let scale = 1, pointX = 0, pointY = 0, start = { x: 0, y: 0 }, isDragging = false;
    const container = document.getElementById('tree-container');

    window.addEventListener('wheel', (e) => { e.preventDefault(); zoom(e.deltaY > 0 ? 0.9 : 1.1); }, { passive: false });
    function zoom(amount) { scale *= amount; updateTransform(); }

    window.onmousedown = (e) => { if(e.target.closest('.btn') || e.target.closest('.node-avatar')) return; isDragging = true; start = { x: e.clientX - pointX, y: e.clientY - pointY }; };
    window.onmousemove = (e) => { if (!isDragging) return; pointX = e.clientX - start.x; pointY = e.clientY - start.y; updateTransform(); };
    window.onmouseup = () => isDragging = false;
    function updateTransform() { container.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }

    function copyLink() { navigator.clipboard.writeText(window.location.href); alert("Link copied to clipboard!"); }

    let familyData = JSON.parse(localStorage.getItem('daaboul_v8')) || [{ id: 1, name: "New Tree", gender: "male", parentId: null }];
    function save() { localStorage.setItem('daaboul_v8', JSON.stringify(familyData)); render(); }

    function editPerson(id) { 
      const p = familyData.find(x => x.id === id);
      p.name = prompt("Enter Name:", p.name) || p.name;
      p.gender = (prompt("Gender (male/female):", p.gender) || "male").toLowerCase();
      save(); 
    }

    function addChild(pid) { const name = prompt("Child's Name:"); if(name) { familyData.push({ id: Date.now(), name, gender: "male", parentId: pid }); save(); } }
    
    function addSpouse(id) { 
      const p = familyData.find(x => x.id === id);
      p.spouseName = prompt("Spouse's Name:");
      p.spouseGender = (prompt("Spouse Gender (male/female):", "female") || "female").toLowerCase();
      save(); 
    }

    function deleteNode(id) {
      if(confirm("Are you sure? This will delete this person and all their children.")) {
        const del = (tid) => {
          familyData.filter(x => x.parentId === tid).forEach(c => del(c.id));
          familyData = familyData.filter(x => x.id !== tid);
        };
        del(id); save();
      }
    }

    function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(familyData)], {type:"application/json"})); a.download="daaboul-tree.json"; a.click(); }
    function importData(e) { const r = new FileReader(); r.onload = (ev) => { familyData = JSON.parse(ev.target.result); save(); }; r.readAsText(e.target.files[0]); }

    function render() {
      const build = (pid) => {
        const items = familyData.filter(x => x.parentId === pid);
        if(!items.length) return "";
        let h = "<ul>";
        items.forEach(m => {
          h += `<li>
            <div class="tree-node">
              <div class="avatar-pair">
                <div class="node-avatar ${m.gender}">${m.name ? m.name[0] : '?'}</div>
                ${m.spouseName ? `<div class="marriage-line"></div><div class="node-avatar ${m.spouseGender}">${m.spouseName[0]}</div>` : ''}
              </div>
              <div class="name-tag">${m.name} ${m.spouseName ? '& '+m.spouseName : ''}</div>
              <div class="node-actions">
                <button class="btn edit-btn" onclick="editPerson(${m.id})">Edit</button>
                <button class="btn add-btn" onclick="addChild(${m.id})">Child</button>
                <button class="btn spouse-btn" onclick="addSpouse(${m.id})">Spouse</button>
                <button class="btn del-btn" onclick="deleteNode(${m.id})">Delete</button>
              </div>
            </div>
            ${build(m.id)}
          </li>`;
        });
        return h + "</ul>";
      };
      container.innerHTML = build(null);
    }
    render();
  </script>
</body>
</html>
