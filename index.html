<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Daaboul Family Tree</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    :root { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --male: #2563eb; --female: #db2777; --line: #64748b; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
    .header { position: fixed; top: 0; width: 100%; background: #0f172a; color: white; padding: 10px; text-align: center; z-index: 1000; }
    .header h2 { margin: 0; font-family: "Lucida Calligraphy", cursive, serif; font-size: 26px; }
    .toolbar { position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 15px; border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; display: flex; gap: 5px; border: 1px solid #cbd5e1; align-items: center; width: 90%; max-width: 500px; justify-content: center; }
    #viewport { width: 100vw; height: 100vh; cursor: grab; display: flex; align-items: center; justify-content: center; touch-action: none; }
    #tree-container { transform-origin: center center; padding-top: 150px; }
    .tree ul { display: flex; justify-content: center; padding: 20px 0; position: relative; list-style: none; }
    .tree li { position: relative; padding: 20px 10px 0; }
    .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 3px solid var(--line); width: 50%; height: 20px; }
    .tree li::after { right: auto; left: 50%; border-left: 3px solid var(--line); }
    .tree-node { background: var(--card); border: 2px solid #cbd5e1; border-radius: 20px; width: 240px; padding: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .avatar-pair { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .node-avatar { width: 55px; height: 55px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; border: 3px solid white; background-size: cover; background-position: center; }
    .male { background-color: var(--male); } .female { background-color: var(--female); }
    .name-tag { font-weight: 800; font-size: 14px; color: var(--text); }
    .btn { padding: 8px 4px; border: none; border-radius: 6px; font-size: 9px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    .btn-edit { background: #e2e8f0; } .btn-child { background: #3b82f6; color: white; } .btn-spouse { background: #10b981; color: white; } .btn-del { background: #ef4444; color: white; }
    .node-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 10px; }
    .zoom-ctrl { font-size: 16px; font-weight: bold; padding: 5px 10px; background: #f1f5f9; border-radius: 50%; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div class="header"><h2>The Daaboul Family Tree</h2></div>
  <div class="toolbar">
    <button class="zoom-ctrl" onclick="zoom(0.8)">➖</button>
    <button class="btn" onclick="resetView()">🏠</button>
    <button class="zoom-ctrl" onclick="zoom(1.2)">➕</button>
    <button class="btn" style="background:#475569;color:white" onclick="document.getElementById('f').click()">📂 Load</button>
    <input type="file" id="f" style="display:none" onchange="importData(event)">
  </div>
  <div id="viewport"><div id="tree-container" class="tree"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCT9sltvZJpDKz8x-y5pI7ABSu7GD3792c",
      authDomain: "daaboul-family-tree.firebaseapp.com",
      projectId: "daaboul-family-tree",
      storageBucket: "daaboul-family-tree.firebasestorage.app",
      messagingSenderId: "169162734833",
      appId: "1:169162734833:web:233a37139441336023bd50",
      measurementId: "G-GENYMJ5HH6",
      databaseURL: "https://daaboul-family-tree-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('familyTree');
    let familyData = [];

    db.on('value', snap => {
      const data = snap.val();
      if(data) {
        familyData = Array.isArray(data) ? data : Object.values(data);
        render();
      }
    });

    function save() { db.set(familyData); }

    function importData(e) {
      const r = new FileReader();
      r.onload = ev => {
        familyData = JSON.parse(ev.target.result);
        render(); save();
      };
      r.readAsText(e.target.files[0]);
    }

    function render() {
      const build = (pid) => {
        const items = familyData.filter(x => x.parentId == pid);
        if(!items.length) return "";
        let h = "<ul>";
        items.forEach(m => {
          const hasS = !!m.spouseName;
          h += `<li><div class="tree-node">
            <div class="avatar-pair">
              <div class="node-avatar ${m.gender}" style="background-image:url('${m.photo || ''}')">${m.photo ? '' : (m.name ? m.name[0] : '?')}</div>
              ${hasS ? `<div class="node-avatar ${m.spouseGender || 'female'}" style="background-image:url('${m.spousePhoto || ''}')">${m.spousePhoto ? '' : m.spouseName[0]}</div>` : ''}
            </div>
            <div class="name-tag">${m.name || 'Unknown'} ${hasS ? '& '+m.spouseName : ''}</div>
            <div class="node-actions">
              <button class="btn btn-edit" onclick="editP(${m.id})">Edit</button>
              <button class="btn btn-child" onclick="addC(${m.id})">+Child</button>
              <button class="btn btn-spouse" onclick="addS(${m.id})">+Spouse</button>
              <button class="btn btn-del" onclick="delP(${m.id})">Del</button>
            </div>
          </div>${build(m.id)}</li>`;
        });
        return h + "</ul>";
      };
      let content = build(null) || build(undefined);
      document.getElementById('tree-container').innerHTML = content;
    }

    function editP(id) {
      const p = familyData.find(x => x.id == id);
      p.name = prompt("Name:", p.name);
      p.gender = (prompt("Gender (male/female):", p.gender)).toLowerCase();
      p.photo = prompt("Photo URL:", p.photo || "");
      save();
    }
    function addC(pid) {
      const n = prompt("Child Name:");
      if(n) { familyData.push({id: Date.now(), name: n, gender: "male", parentId: pid}); save(); }
    }
    function addS(id) {
      const p = familyData.find(x => x.id == id);
      p.spouseName = prompt("Spouse Name:");
      save();
    }
    function delP(id) {
      if(confirm("Delete person?")) { familyData = familyData.filter(x => x.id != id && x.parentId != id); save(); }
    }

    // PAN & ZOOM LOGIC (TOUCH SUPPORT)
    let s = 1, x = 0, y = 0, startX = 0, startY = 0, isDown = false;
    const ct = document.getElementById('tree-container');

    function zoom(amt) { s *= amt; up(); }
    function resetView() { s = 1; x = 0; y = 0; up(); }
    function up() { ct.style.transform = `translate(${x}px, ${y}px) scale(${s})`; }

    window.onmousedown = e => { if(e.target.closest('.btn')) return; isDown = true; startX = e.clientX - x; startY = e.clientY - y; };
    window.ontouchstart = e => { if(e.target.closest('.btn')) return; isDown = true; startX = e.touches[0].clientX - x; startY = e.touches[0].clientY - y; };
    window.onmousemove = e => { if(!isDown) return; x = e.clientX - startX; y = e.clientY - startY; up(); };
    window.ontouchmove = e => { if(!isDown) return; x = e.touches[0].clientX - startX; y = e.touches[0].clientY - startY; up(); };
    window.onmouseup = window.ontouchend = () => isDown = false;
  </script>
</body>
</html>
