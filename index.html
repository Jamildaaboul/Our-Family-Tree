<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Daaboul Family Tree</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    :root { 
      --wood: #5d4037; 
      --leaf: #2e7d32; 
      --paper: #fdf5e6; 
      --male: #2563eb; 
      --female: #db2777; 
    }
    
    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: var(--paper); 
      background-image: url('https://www.transparenttextures.com/patterns/p6.png');
      margin: 0; 
      overflow: hidden; 
      height: 100vh; 
      width: 100vw; 
      touch-action: none; 
    }
    
    .interface-layer { 
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000; 
      background: rgba(62, 39, 35, 0.95); padding: 15px; 
      display: flex; flex-direction: column; align-items: center; gap: 10px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
    }
    .header-title { color: #d7ccc8; margin: 0; font-family: "Lucida Calligraphy", cursive, serif; font-size: 24px; }

    .controls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .search-input { padding: 10px 15px; border-radius: 25px; border: 2px solid #8d6e63; width: 200px; outline: none; }

    /* LAYOUT FIX: Forces the root of the tree to the absolute center of the screen */
    #viewport { width: 100vw; height: 100vh; cursor: grab; position: relative; overflow: hidden; z-index: 100; touch-action: none; }
    #tree-container { position: absolute; left: 50%; top: 0; padding-top: 220px; transform-origin: top center; transform: translate(-50%, 0) scale(1); }

    /* ORGANIC TREE BRANCHES */
    .tree ul { display: flex; justify-content: center; padding: 40px 0; position: relative; list-style: none; }
    .tree li { position: relative; padding: 40px 15px 0; }
    
    .tree li::before, .tree li::after { 
      content: ''; position: absolute; top: 0; right: 50%; 
      border-top: 6px solid var(--wood); 
      width: 50%; height: 40px; 
      border-radius: 10px;
    }
    .tree li::after { right: auto; left: 50%; border-left: 6px solid var(--wood); }
    .tree li:only-child::after, .tree li:only-child::before { display: none; }
    .tree li:only-child { padding-top: 0; }
    .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
    .tree li:last-child::before { border-right: 6px solid var(--wood); border-radius: 0 10px 0 0; }
    .tree li:first-child::after { border-radius: 10px 0 0 0; }
    .tree ul ul::before { 
      content: ''; position: absolute; top: 0; left: 50%; 
      border-left: 6px solid var(--wood); width: 0; height: 40px; 
    }

    /* WOODEN NODES */
    .tree-node { 
      background: white; 
      border: 4px solid var(--wood); 
      border-radius: 15px; 
      width: 260px; padding: 15px; 
      display: inline-block; 
      box-shadow: 8px 8px 0px rgba(93, 64, 55, 0.2);
      position: relative;
    }
    .tree-node::before {
      content: '🍃'; position: absolute; top: -15px; left: -10px; font-size: 20px;
    }

    .avatar-pair { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; }
    
    .node-avatar { 
      width: 65px; height: 65px; border-radius: 50%; 
      border: 3px solid var(--wood); 
      background-size: cover; background-position: center; 
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: white;
      cursor: pointer; position: relative; 
    }
    .node-avatar::after { content: '📸'; position: absolute; bottom: -5px; right: -5px; font-size: 14px; background: white; border-radius: 50%; padding: 2px; border: 1px solid var(--wood); }
    
    .male { background-color: var(--male); } 
    .female { background-color: var(--female); }
    
    .name-tag { font-weight: bold; font-size: 16px; color: var(--wood); margin: 5px 0; }
    .dob-tag { font-size: 13px; color: var(--leaf); font-weight: bold; margin-bottom: 10px; }

    .btn { padding: 8px; border: none; border-radius: 5px; font-size: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; background: #efebe9; color: var(--wood); border-bottom: 2px solid #d7ccc8; }
    .node-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .zoom-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #d7ccc8; background: var(--wood); color: white; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    
    .highlighted { background: #fff9c4 !important; border-color: #fbc02d !important; }
  </style>
</head>
<body>

  <div class="interface-layer" id="top-nav">
    <h2 class="header-title">The Daaboul Family Tree</h2>
    <div class="controls-row">
      <button class="zoom-btn" onpointerdown="zoom(0.8)">−</button>
      <button class="zoom-btn" onpointerdown="zoom(1.2)">+</button>
      <input type="text" class="search-input" id="searchBox" placeholder="Search Ancestors..." oninput="runSearch()">
      <button class="btn" style="background:var(--leaf); color:white;" onclick="resetView()">🏠 Home</button>
      <button class="btn" style="background:var(--wood); color:white;" onclick="document.getElementById('fileIn').click()">📂 Load</button>
      <input type="file" id="fileIn" style="display:none" onchange="importData(event)">
      <input type="file" id="imagePicker" style="display:none" accept="image/*">
    </div>
  </div>

  <div id="viewport"><div id="tree-container" class="tree"></div></div>

  <script>
